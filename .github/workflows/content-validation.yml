name: Site Validation

on:
  push:
    branches:
      - main
    paths:
      - "content/**"
      - "assets/**"
      - "robots.txt"
      - "site.webmanifest"
      - "index.html"
      - "content-config.js"
      - "content-service.js"
      - "script.js"
      - "scripts/build-embedded-manifest.mjs"
      - "scripts/browser-smoke.mjs"
      - "scripts/sync-embedded-manifest.mjs"
      - "scripts/validate-shell.mjs"
      - "scripts/validate-content.mjs"
      - "scripts/validate-runtime.mjs"
      - "tests/browser-smoke-runner.html"
      - ".github/workflows/content-validation.yml"
  pull_request:
    paths:
      - "content/**"
      - "assets/**"
      - "robots.txt"
      - "site.webmanifest"
      - "index.html"
      - "content-config.js"
      - "content-service.js"
      - "script.js"
      - "scripts/build-embedded-manifest.mjs"
      - "scripts/browser-smoke.mjs"
      - "scripts/sync-embedded-manifest.mjs"
      - "scripts/validate-shell.mjs"
      - "scripts/validate-content.mjs"
      - "scripts/validate-runtime.mjs"
      - "tests/browser-smoke-runner.html"
      - ".github/workflows/content-validation.yml"

jobs:
  validate-site:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check embedded manifest sync
        run: |
          node scripts/sync-embedded-manifest.mjs
          git diff --exit-code -- index.html

      - name: Validate content contract
        run: node scripts/validate-content.mjs

      - name: Validate shell and SEO baseline
        run: node scripts/validate-shell.mjs

      - name: Validate browser-side runtime contracts
        run: node scripts/validate-runtime.mjs

      - name: Run browser interaction smoke test
        run: node scripts/browser-smoke.mjs

      - name: Check browser scripts syntax
        run: |
          node --check content-service.js
          node --check script.js
