<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAOS Browser Smoke Runner</title>
    <style>
        body {
            margin: 0;
            padding: 24px;
            font: 14px/1.5 Inter, Arial, sans-serif;
            background: #10131d;
            color: #f3f5ff;
        }

        h1,
        p {
            margin: 0 0 12px;
        }

        .runner-frame {
            display: block;
            border: 1px solid #2f3550;
            background: #0b0f19;
            margin: 20px 0;
        }

        .runner-report {
            white-space: pre-wrap;
            background: #151b29;
            border: 1px solid #2f3550;
            border-radius: 12px;
            padding: 16px;
            margin: 0;
        }
    </style>
</head>
<body data-status="running">
    <h1>Browser Smoke Runner</h1>
    <p id="runner-status">Running browser checks...</p>
    <iframe id="app-frame" class="runner-frame" title="LikeAnOpenSource smoke scenario"></iframe>
    <pre id="runner-report" class="runner-report"></pre>
    <script id="smoke-result" type="application/json">{}</script>
    <script>
        (() => {
            const params = new URLSearchParams(window.location.search);
            const scenario = params.get("scenario") || "desktop";
            const frame = document.getElementById("app-frame");
            const statusNode = document.getElementById("runner-status");
            const reportNode = document.getElementById("runner-report");
            const resultNode = document.getElementById("smoke-result");
            const results = [];

            const wait = (ms) => new Promise((resolve) => window.setTimeout(resolve, ms));

            const setResult = (status, error = null) => {
                const payload = {
                    status,
                    scenario,
                    results,
                    error: error ? String(error.message || error) : null
                };

                document.body.dataset.status = status;
                statusNode.textContent =
                    status === "pass"
                        ? `PASS: ${scenario} smoke checks completed.`
                        : `FAIL: ${scenario} smoke checks failed.`;
                reportNode.textContent = JSON.stringify(payload, null, 2);
                resultNode.textContent = JSON.stringify(payload, null, 2).replace(/<\/script/gi, "<\\/script");
            };

            const assert = (condition, message) => {
                results.push({
                    status: condition ? "pass" : "fail",
                    message
                });

                if (!condition) {
                    throw new Error(message);
                }
            };

            const waitFor = async (predicate, failureMessage, timeoutMs = 10000) => {
                const startedAt = Date.now();

                while (Date.now() - startedAt < timeoutMs) {
                    try {
                        const value = predicate();
                        if (value) {
                            return value;
                        }
                    } catch {
                        // Ignore transient DOM errors while the app is still hydrating.
                    }

                    await wait(50);
                }

                throw new Error(failureMessage);
            };

            const clickElement = (target, view) => {
                if (!target) {
                    throw new Error("Attempted to click a missing element.");
                }

                target.dispatchEvent(
                    new view.MouseEvent("click", {
                        bubbles: true,
                        cancelable: true,
                        view
                    })
                );
            };

            const loadApp = async (url) => {
                const expectedUrl = new URL(url, window.location.href);
                const expectedToken = expectedUrl.searchParams.get("t") || "";
                frame.src = url;

                await waitFor(
                    () =>
                        frame.contentWindow &&
                        frame.contentDocument &&
                        frame.contentWindow.location.pathname === "/" &&
                        new URLSearchParams(frame.contentWindow.location.search).get("t") ===
                            expectedToken &&
                        frame.contentDocument.readyState === "complete",
                    "Runner: app frame did not finish navigating to the app document."
                );

                const frameWindow = frame.contentWindow;
                const frameDocument = frame.contentDocument;

                await waitFor(
                    () =>
                        frameDocument.querySelector("#content-contribute") &&
                        frameDocument.querySelector('.header-nav a[data-menu="contribute"]') &&
                        frameDocument.querySelector("#menu-home .sidebar-title")?.textContent !== "Loading",
                    "Runner: manifest content did not finish rendering."
                );

                const searchStatusText = frameDocument.getElementById("search-status")?.textContent || "";
                assert(
                    !/Preparing content/i.test(searchStatusText),
                    "Runner: shell loading copy should be replaced after hydration."
                );
                assert(
                    !frameDocument.documentElement.classList.contains("app-hydrating"),
                    "Runner: hydration guard class should be cleared once the app finishes rendering."
                );

                return { frameWindow, frameDocument };
            };

            const runDesktopScenario = async (frameWindow, frameDocument) => {
                const contributeNav = frameDocument.querySelector('.header-nav a[data-menu="contribute"]');
                assert(Boolean(contributeNav), 'Desktop: primary navigation should include "Contribute".');

                clickElement(contributeNav, frameWindow);
                await waitFor(() => {
                    const section = frameDocument.getElementById("content-contribute");
                    return section && !section.hidden && section.classList.contains("active");
                }, 'Desktop: "Contribute" section did not activate.');
                assert(
                    contributeNav.getAttribute("aria-current") === "page",
                    'Desktop: "Contribute" nav item should become current.'
                );

                const projectsNav = frameDocument.querySelector('.header-nav a[data-menu="projects"]');
                clickElement(projectsNav, frameWindow);
                await waitFor(() => {
                    const section = frameDocument.getElementById("content-projects");
                    return section && !section.hidden && section.classList.contains("active");
                }, 'Desktop: "Projects" section did not activate.');
                assert(
                    Boolean(frameDocument.getElementById("projects-published-notes")),
                    'Desktop: "Projects" should expose the published-notes group.'
                );

                frameWindow.history.back();
                await waitFor(() => {
                    const contributeSection = frameDocument.getElementById("content-contribute");
                    return (
                        frameWindow.location.hash === "#content-contribute" &&
                        contributeSection &&
                        !contributeSection.hidden &&
                        contributeSection.classList.contains("active")
                    );
                }, 'Desktop: browser back did not restore the prior "Contribute" state.');

                frameWindow.history.back();
                await waitFor(() => {
                    const homeSection = frameDocument.getElementById("content-home");
                    return (
                        frameWindow.location.hash === "" &&
                        homeSection &&
                        !homeSection.hidden &&
                        homeSection.classList.contains("active")
                    );
                }, "Desktop: browser back did not restore the hashless home state.");

                const aboutNav = frameDocument.querySelector('.header-nav a[data-menu="about"]');
                clickElement(aboutNav, frameWindow);
                await waitFor(() => {
                    const section = frameDocument.getElementById("content-about");
                    return section && !section.hidden && section.classList.contains("active");
                }, 'Desktop: "About" section did not activate.');

                const aboutSidebarMenu = frameDocument.getElementById("menu-about");
                assert(
                    Boolean(aboutSidebarMenu) &&
                        !aboutSidebarMenu.hidden &&
                        aboutSidebarMenu.classList.contains("active"),
                    'Desktop: "About" sidebar menu should be active before opening support.'
                );

                const supportCard = frameDocument.querySelector("#sidebar-footer .sidebar-funding-card");
                assert(Boolean(supportCard), "Desktop: sidebar should render the support funding card.");

                clickElement(supportCard, frameWindow);
                await waitFor(() => {
                    const supportSection = frameDocument.getElementById("content-support");
                    return (
                        frameWindow.location.hash === "#content-support" &&
                        supportSection &&
                        !supportSection.hidden &&
                        supportSection.classList.contains("active")
                    );
                }, 'Desktop: clicking the support footer card did not open the "Support LAOS" section.');
                assert(
                    /coming soon/i.test(
                        frameDocument.getElementById("support-wallets")?.textContent || ""
                    ),
                    'Desktop: support wallets should show the "Coming soon" placeholder text.'
                );
                assert(
                    Boolean(aboutSidebarMenu) &&
                        !aboutSidebarMenu.hidden &&
                        aboutSidebarMenu.classList.contains("active"),
                    'Desktop: opening support should preserve the previously active sidebar menu.'
                );
                assert(
                    aboutNav.getAttribute("aria-current") === "page",
                    'Desktop: opening support should preserve the previously active primary nav context.'
                );

                const articlesNav = frameDocument.querySelector('.header-nav a[data-menu="articles"]');
                clickElement(articlesNav, frameWindow);
                await waitFor(() => {
                    const section = frameDocument.getElementById("content-articles");
                    return section && !section.hidden && section.classList.contains("active");
                }, 'Desktop: "Articles" section did not activate.');
                assert(
                    Boolean(frameDocument.getElementById("articles-published-library")),
                    'Desktop: "Articles" should expose the published-library group.'
                );

                const searchInput = frameDocument.getElementById("site-search");
                searchInput.value = "documentation platforms";
                searchInput.dispatchEvent(
                    new frameWindow.Event("input", {
                        bubbles: true
                    })
                );

                await waitFor(() => {
                    const searchResults = frameDocument.getElementById("search-results");
                    return searchResults && !searchResults.hidden;
                }, "Desktop: search results did not appear.");

                const resultLink = await waitFor(
                    () =>
                        Array.from(frameDocument.querySelectorAll("#search-results-list a")).find(
                            (link) =>
                                link.getAttribute("href") === "#record-docs-platform-comparison-guide"
                        ),
                    "Desktop: record-level search did not surface the documentation-platforms brief."
                );

                clickElement(resultLink, frameWindow);
                await waitFor(() => {
                    const contributeSection = frameDocument.getElementById("content-contribute");
                    const record = frameDocument.getElementById("record-docs-platform-comparison-guide");
                    return (
                        frameWindow.location.hash === "#record-docs-platform-comparison-guide" &&
                        contributeSection &&
                        contributeSection.classList.contains("active") &&
                        record &&
                        !record.hidden
                    );
                }, "Desktop: clicking a search result did not open the matching topic brief.");

                frameWindow.history.back();
                await waitFor(() => {
                    const searchResults = frameDocument.getElementById("search-results");
                    const searchInputAfterBack = frameDocument.getElementById("site-search");
                    return (
                        frameWindow.location.hash === "" &&
                        new frameWindow.URLSearchParams(frameWindow.location.search).get("q") ===
                            "documentation platforms" &&
                        searchResults &&
                        !searchResults.hidden &&
                        searchInputAfterBack &&
                        searchInputAfterBack.value === "documentation platforms"
                    );
                }, "Desktop: browser back did not restore the URL-driven search state.");

                const invalidHashContext = await loadApp(
                    `/?debugContentSource=1&smokeScenario=desktop&t=${Date.now()}#not-a-real-target`
                );
                await waitFor(() => {
                    const invalidHashHomeSection =
                        invalidHashContext.frameDocument.getElementById("content-home");
                    return (
                        invalidHashContext.frameWindow.location.hash === "#content-home" &&
                        invalidHashHomeSection &&
                        !invalidHashHomeSection.hidden &&
                        invalidHashHomeSection.classList.contains("active")
                    );
                }, "Desktop: an invalid initial hash should normalize to the home section.");

                const initialQueryContext = await loadApp(
                    `/?debugContentSource=1&smokeScenario=desktop&q=documentation%20platforms&t=${Date.now()}`
                );
                await waitFor(() => {
                    const initialQueryResults =
                        initialQueryContext.frameDocument.getElementById("search-results");
                    const initialQueryInput =
                        initialQueryContext.frameDocument.getElementById("site-search");
                    return (
                        new initialQueryContext.frameWindow.URLSearchParams(
                            initialQueryContext.frameWindow.location.search
                        ).get("q") === "documentation platforms" &&
                        initialQueryResults &&
                        !initialQueryResults.hidden &&
                        initialQueryInput &&
                        initialQueryInput.value === "documentation platforms"
                    );
                }, "Desktop: an initial q parameter should restore the search view on load.");

                const directSupportContext = await loadApp(
                    `/?debugContentSource=1&smokeScenario=desktop&t=${Date.now()}#content-support`
                );
                await waitFor(() => {
                    const directSupportSection =
                        directSupportContext.frameDocument.getElementById("content-support");
                    return (
                        directSupportContext.frameWindow.location.hash === "#content-support" &&
                        directSupportSection &&
                        !directSupportSection.hidden &&
                        directSupportSection.classList.contains("active")
                    );
                }, 'Desktop: direct navigation to "#content-support" should restore the support section.');
            };

            const runMobileScenario = async (frameWindow, frameDocument) => {
                await waitFor(
                    () => frameWindow.innerWidth < 1024,
                    "Mobile: iframe width did not enter the mobile breakpoint."
                );

                const menuToggle = frameDocument.getElementById("menu-toggle");
                const sidebar = frameDocument.getElementById("sidebar");
                const backdrop = frameDocument.getElementById("sidebar-backdrop");
                const closeButton = frameDocument.getElementById("sidebar-close");
                assert(Boolean(menuToggle), "Mobile: menu toggle should exist.");

                clickElement(menuToggle, frameWindow);
                await waitFor(
                    () =>
                        frameDocument.body.classList.contains("sidebar-open") &&
                        sidebar.classList.contains("open") &&
                        sidebar.getAttribute("aria-hidden") === "false" &&
                        !backdrop.hidden,
                    "Mobile: sidebar did not open."
                );

                clickElement(closeButton, frameWindow);
                await waitFor(
                    () =>
                        !frameDocument.body.classList.contains("sidebar-open") &&
                        sidebar.getAttribute("aria-hidden") === "true",
                    "Mobile: sidebar did not close from the close button."
                );
                await waitFor(
                    () => frameDocument.activeElement === menuToggle,
                    "Mobile: focus did not return to the menu toggle."
                );

                clickElement(menuToggle, frameWindow);
                await waitFor(
                    () => frameDocument.body.classList.contains("sidebar-open"),
                    "Mobile: sidebar did not reopen."
                );

                clickElement(backdrop, frameWindow);
                await waitFor(
                    () => !frameDocument.body.classList.contains("sidebar-open"),
                    "Mobile: backdrop click did not close the sidebar."
                );

                const aboutNav = frameDocument.querySelector('.header-nav a[data-menu="about"]');
                clickElement(aboutNav, frameWindow);
                await waitFor(() => {
                    const section = frameDocument.getElementById("content-about");
                    return section && !section.hidden && section.classList.contains("active");
                }, 'Mobile: "About" section did not activate.');

                clickElement(menuToggle, frameWindow);
                await waitFor(
                    () => frameDocument.body.classList.contains("sidebar-open"),
                    "Mobile: sidebar did not reopen for the support card check."
                );

                const supportCard = frameDocument.querySelector("#sidebar-footer .sidebar-funding-card");
                assert(Boolean(supportCard), "Mobile: sidebar should render the support funding card.");
                assert(
                    frameDocument.getElementById("menu-about")?.classList.contains("active"),
                    'Mobile: "About" sidebar menu should stay active before opening support.'
                );

                clickElement(supportCard, frameWindow);
                await waitFor(
                    () => {
                        const supportSection = frameDocument.getElementById("content-support");
                        return (
                            frameWindow.location.hash === "#content-support" &&
                            supportSection &&
                            !supportSection.hidden &&
                            supportSection.classList.contains("active") &&
                            !frameDocument.body.classList.contains("sidebar-open") &&
                            sidebar.getAttribute("aria-hidden") === "true"
                        );
                    },
                    "Mobile: tapping the support funding card should open the support section and close the sidebar."
                );

                clickElement(menuToggle, frameWindow);
                await waitFor(
                    () =>
                        frameDocument.body.classList.contains("sidebar-open") &&
                        frameDocument.getElementById("menu-about")?.classList.contains("active"),
                    "Mobile: reopening the sidebar from support should preserve the prior menu context."
                );
            };

            const run = async () => {
                frame.style.width = scenario === "mobile" ? "390px" : "1366px";
                frame.style.height = scenario === "mobile" ? "900px" : "1200px";
                const { frameWindow, frameDocument } = await loadApp(
                    `/?debugContentSource=1&smokeScenario=${encodeURIComponent(scenario)}&t=${Date.now()}`
                );

                if (scenario === "mobile") {
                    await runMobileScenario(frameWindow, frameDocument);
                } else {
                    await runDesktopScenario(frameWindow, frameDocument);
                }

                setResult("pass");
            };

            run().catch((error) => {
                setResult("fail", error);
            });
        })();
    </script>
</body>
</html>
